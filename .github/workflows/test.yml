name: Pruebas

# Ejecuta las pruebas automáticamente al hacer push o abrir un pull request.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # 1) Descarga el código del repositorio en el runner.
      - name: Clonar el repositorio
        uses: actions/checkout@v4

      # 2) Instala Python 3.11.
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3) Instala las dependencias del proyecto.
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4) Ejecuta las pruebas y muestra el resultado de cada una (-v = verbose).
      - name: Ejecutar pruebas con pytest
        run: pytest -v
